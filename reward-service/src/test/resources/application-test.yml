spring:
  datasource:
    url: jdbc:h2:mem:rewarddb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
  flyway:
    enabled: false

logging:
  level:
    root: WARN
    com.paypal: INFO
