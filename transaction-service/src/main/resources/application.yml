server:
  port: 8082

spring:
  application:
    name: transaction-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/transactiondb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    template:
      default-topic: transaction-events

  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connectTimeout: ${FEIGN_CONNECT_TIMEOUT_MS:2000}
            readTimeout: ${FEIGN_READ_TIMEOUT_MS:5000}

logging:
  level:
    com.paypal.transaction_service: ${APP_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:WARN}
    org.springframework.kafka: ${KAFKA_LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}

# Custom application properties
app:
  security:
    internal-api-key: ${INTERNAL_API_KEY}
    gateway-request-key: ${GATEWAY_REQUEST_KEY}
  reconciliation:
    enabled: ${TRANSACTION_RECONCILIATION_ENABLED:true}
    scan-delay-ms: ${TRANSACTION_RECONCILIATION_SCAN_DELAY_MS:60000}
    stale-after-seconds: ${TRANSACTION_RECONCILIATION_STALE_AFTER_SECONDS:120}
  services:
    wallet-url: ${WALLET_SERVICE_URL:http://wallet-service:8088/api/v1/wallets}
    user-url: ${USER_SERVICE_URL:http://user-service:8081/api/users}
  kafka:
    topics:
      transaction-events: transaction-events
      wallet-updates: wallet-updates
